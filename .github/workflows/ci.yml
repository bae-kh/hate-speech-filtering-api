name: CI
# Run tests and Docker build on push and pull request

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Run Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyTorch CPU
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --no-cache-dir --no-compile \
            "https://download.pytorch.org/whl/cpu/torch-2.2.2%2Bcpu-cp311-cp311-linux_x86_64.whl"

      - name: Install dependencies
        run: |
          python -m pip install --no-cache-dir --no-compile -r requirements.txt

      - name: Run tests
        run: |
          pytest -v

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t hate-speech-api .